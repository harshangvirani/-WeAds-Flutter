workflows:
  ios-only-workflow:
    name: iOS IPA Build

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # Install dependencies
      - flutter pub get

      # Build IPA for production flavor (App Store)
      - >
        flutter build ipa --release --flavor prod
        --export-method app-store

      # Build IPA for development flavor (Ad Hoc)
      - >
        flutter build ipa --release --flavor dev
        --export-method ad-hoc

    artifacts:
      - build/ios/ipa/Runner-prod.ipa
      - build/ios/ipa/Runner-dev.ipa
